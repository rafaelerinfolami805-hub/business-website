<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Success</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .success-box {
      background: white;
      padding: 50px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #16a34a;
      margin-bottom: 15px;
    }

    p {
      color: #555;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
    }

    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="success-box">
  <h1>Message Sent Successfully!</h1>
  <p>Thank you for contacting us. We will reply soon.</p>
  <a href="index.html">Back to Home</a>
  </div>

</body>
</html>
